version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # Diabetes DB ulanish
    DIABETES_DB_HOST: postgres
    DIABETES_DB_PORT: 5432
    DIABETES_DB_NAME: diabetes_risk
    DIABETES_DB_USER: postgres
    DIABETES_DB_PASSWORD: postgres
  volumes:
    - ./dags:/opt/airflow/dags
    - ./tasks:/opt/airflow/tasks
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./generate_dataset.py:/opt/airflow/tasks/generate_dataset.py
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - diabetes_net

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: diabetes_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: airflow,diabetes_risk
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
      - ./diabetes_db_migration.py:/docker-entrypoint-initdb.d/migration.py
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - diabetes_net

  # ── Airflow Init ──────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@diabetes.uz
        echo "Airflow initialized"
    restart: on-failure

  # ── Airflow Webserver ─────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ─────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── FastAPI ───────────────────────────────────────────────
  fastapi:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: diabetes_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: diabetes_risk
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - diabetes_net
    restart: unless-stopped

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diabetes_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - fastapi
    networks:
      - diabetes_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  diabetes_net:
    driver: bridge
